name: DevSecOps CI
on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for full history scans, but we'll use 'dir' for now

      # STAGE 1: Secret Scanning
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: dir --source . --verbose --exit-code 1

      # STAGE 2: SAST (SonarQube)
      - name: SAST (SonarQube)
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            sonar.projectKey=fomogbehin07_DevSecOps_Simple_Pipeline
            sonar.organization=your_org
            sonar.sources=.
            sonar.host.url=https://sonarcloud.io

      # STAGE 3: SCA (Dependency Scan)
      - name: SCA (Snyk)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      # STAGE 4: SBOM Generation
      - name: SBOM Generation (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-file
          path: sbom.json

      # STAGE 5: DAST (Live Scan)
      - name: DAST (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'example.com' # Replace with your URL
